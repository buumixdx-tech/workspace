<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🚀 buumicloud · 应用门户</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #1a1d24;
      --card-hover: #232730;
      --border: #2a2f3a;
      --text: #e6e8eb;
      --muted: #8a93a3;
      --green: #3fb950;
      --grey: #555c66;
      --lock: #d29922;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
    }
    header {
      padding: 32px 32px 24px;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 600;
    }
    header .meta {
      color: var(--muted);
      font-size: 13px;
    }
    main.grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 24px 32px 48px;
    }
    a.card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 18px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      transition: background .15s, transform .1s;
    }
    a.card:hover {
      background: var(--card-hover);
      transform: translateY(-1px);
    }
    a.card.locked {
      border-color: rgba(210, 153, 34, 0.35);
    }
    .user {
      color: var(--green);
      font-weight: 500;
    }
    .logout {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 2px 10px;
      margin-left: 8px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    .logout:hover { color: var(--text); border-color: var(--text); }
    .status {
      position: absolute;
      top: 16px;
      right: 18px;
      font-size: 14px;
      line-height: 1;
    }
    .status[data-state="checking"] { color: var(--muted); }
    .status[data-state="green"]    { color: var(--green); }
    .status[data-state="grey"]     { color: var(--grey); }
    .name {
      font-size: 16px;
      font-weight: 600;
      padding-right: 24px;
    }
    .url {
      font-size: 12px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      word-break: break-all;
    }
    .lock {
      position: absolute;
      bottom: 16px;
      right: 18px;
      color: var(--lock);
      font-size: 13px;
    }
    footer {
      padding: 16px 32px 32px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>🚀 buumicloud · 应用门户</h1>
    <span class="meta">
      主域:buumicloud.com.cn · 自动刷新 30s · <span id="last-check">—</span>
      {% if user %}· <span class="user">{{ user }}</span>
      <form method="POST" action="/api/logout" style="display:inline">
        <button type="submit" class="logout">登出</button>
      </form>{% endif %}
    </span>
  </header>
  <main class="grid">
    {% for app in apps %}
    <a class="card {% if app.auth %}locked{% endif %}"
       href="{{ app.url }}" target="_blank" rel="noopener">
      <span class="status" data-key="{{ app.key }}" data-state="checking">●</span>
      <span class="name">{{ app.name }}{% if app.auth %} <span title="需登录后访问">🔒</span>{% endif %}</span>
      <span class="url">{{ app.url }}</span>
    </a>
    {% endfor %}
  </main>
  <footer>
    单页面由 portal 服务驱动 · Flask · <a href="/health" style="color: var(--muted);">/health</a>
  </footer>
  <script>
    function update(statuses) {
      const t = new Date().toLocaleTimeString();
      document.getElementById('last-check').textContent = '最近检查:' + t;
      document.querySelectorAll('.status').forEach(el => {
        const k = el.getAttribute('data-key');
        el.setAttribute('data-state', statuses[k] || 'grey');
      });
    }
    function tick() {
      fetch('/health', {cache: 'no-store'})
        .then(r => r.ok ? r.json() : {})
        .then(update)
        .catch(() => update({}));
    }
    tick();
    setInterval(tick, 30000);
  </script>
</body>
</html>
