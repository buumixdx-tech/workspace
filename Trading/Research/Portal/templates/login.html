<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 · buumicloud 门户</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #1a1d24;
      --border: #2a2f3a;
      --text: #e6e8eb;
      --muted: #8a93a3;
      --accent: #3fb950;
      --error: #f85149;
      --input-bg: #0a0c10;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      width: 100%;
      max-width: 360px;
      padding: 32px 28px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 20px;
      font-weight: 600;
    }
    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus {
      border-color: var(--accent);
    }
    .field { margin-bottom: 14px; }
    button {
      width: 100%;
      padding: 11px 14px;
      background: var(--accent);
      color: #0a0c10;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
    }
    button:hover { filter: brightness(1.08); }
    .error {
      color: var(--error);
      font-size: 13px;
      margin-bottom: 14px;
      padding: 8px 10px;
      background: rgba(248, 81, 73, 0.08);
      border: 1px solid rgba(248, 81, 73, 0.3);
      border-radius: 6px;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <form class="box" method="POST" action="/api/login">
    <h1>🚀 buumicloud 门户</h1>
    <p class="sub">输入账号继续</p>

    {% if error %}<div class="error">{{ error }}</div>{% endif %}

    <input type="hidden" name="next" value="{{ next }}">

    <div class="field">
      <label for="username">账号</label>
      <input id="username" name="username" type="text" autocomplete="username" required autofocus>
    </div>

    <div class="field">
      <label for="password">密码</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>

    <button type="submit">登录</button>
    <p class="footer">会话保留 7 天</p>
  </form>
</body>
</html>
