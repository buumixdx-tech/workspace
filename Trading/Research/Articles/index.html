<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Articles · buumicloud</title>
<style>
:root {
  --bg: #0e1116; --bg-card: #181c25; --bg-hover: #1f2532;
  --text: #e8eaed; --text-dim: #9aa0a6; --border: rgba(255,255,255,0.08);
  --accent: #5e72e4; --green: #10b981; --red: #ff6b6b;
  --shadow: 0 10px 40px rgba(0,0,0,0.4);
}
*,*::before,*::after { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background:
    radial-gradient(circle at 15% 5%, rgba(94,114,228,0.10), transparent 40%),
    radial-gradient(circle at 85% 95%, rgba(255,107,107,0.06), transparent 40%),
    var(--bg);
  color: var(--text); line-height: 1.6; margin: 0; padding: 0; min-height: 100vh;
}
.container { max-width: 1080px; margin: 0 auto; padding: 40px 24px; }
header.title { text-align: center; padding: 32px 0 28px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
header.title h1 {
  font-size: 32px; margin: 0 0 8px;
  background: linear-gradient(135deg, #5e72e4 0%, #ff6b6b 100%);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  font-weight: 800;
}
header.title p { color: var(--text-dim); font-size: 14px; margin: 0; }
section.panel { background: var(--bg-card); padding: 28px; border-radius: 14px; border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 28px; }
.panel-title { font-size: 13px; color: var(--accent); background: rgba(94,114,228,0.12); padding: 4px 12px; border-radius: 6px; margin-bottom: 16px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; display: inline-block; }
.toolbar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
.toolbar input { flex: 1; min-width: 200px; padding: 8px 12px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); font-size: 13px; outline: none; }
.toolbar input:focus { border-color: var(--accent); }
.btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; font-size: 13px; }
.btn:hover { color: var(--text); border-color: var(--accent); }
.btn.primary { background: rgba(94,114,228,0.20); color: var(--accent); border-color: rgba(94,114,228,0.4); }
.btn.danger { background: rgba(255,107,107,0.15); color: var(--red); border-color: rgba(255,107,107,0.4); }
.btn.danger:hover { background: rgba(255,107,107,0.25); }
.btn.ok { background: rgba(16,185,129,0.15); color: var(--green); border-color: rgba(16,185,129,0.4); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.toolbar .spacer { flex: 1; }
.toolbar .admin-status { font-size: 12px; color: var(--text-dim); display: flex; gap: 8px; align-items: center; }
.toolbar .admin-status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); }
.toolbar .admin-status.on .dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
.toolbar .admin-status.on { color: var(--green); }

.article-card {
  display: block; padding: 16px 18px; margin-bottom: 10px;
  background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border);
  text-decoration: none; color: inherit; transition: all 0.15s; position: relative;
}
.article-card:hover { background: var(--bg-hover); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
.article-card h3 { margin: 0 0 6px; font-size: 16px; color: var(--text); font-weight: 600; }
.article-card .meta { color: var(--text-dim); font-size: 12px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.badge.trans { background: rgba(16,185,129,0.20); color: var(--green); }
.badge.raw { background: rgba(255,255,255,0.08); color: var(--text-dim); }
.badge.img { background: rgba(94,114,228,0.20); color: var(--accent); }
.copy-btn { margin-left: auto; padding: 4px 10px; font-size: 12px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; }
.copy-btn:hover { color: var(--text); border-color: var(--accent); }
.copy-btn.ok { color: var(--green); border-color: var(--green); }
.delete-btn { display: none; margin-left: 6px; padding: 4px 10px; font-size: 12px; border-radius: 5px; border: 1px solid rgba(255,107,107,0.3); background: transparent; color: var(--red); cursor: pointer; }
.delete-btn:hover { background: rgba(255,107,107,0.15); }
.admin-mode .delete-btn { display: inline-block; }
.empty { text-align: center; color: var(--text-dim); padding: 40px 0; }
.toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; background: var(--bg-card); border: 1px solid var(--border); box-shadow: var(--shadow); display: none; font-size: 14px; z-index: 100; }
.toast.show { display: block; animation: slideIn 0.2s ease; }
.toast.ok { border-color: var(--green); }
.toast.err { border-color: var(--red); }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 200; }
.modal-bg.show { display: flex; }
.modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; min-width: 360px; max-width: 480px; box-shadow: var(--shadow); }
.modal h3 { margin: 0 0 16px; font-size: 18px; }
.modal p { color: var(--text-dim); font-size: 14px; margin: 0 0 16px; }
.modal input { width: 100%; padding: 10px 14px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); font-size: 14px; outline: none; margin-bottom: 16px; }
.modal input:focus { border-color: var(--accent); }
.modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
footer { text-align: center; color: var(--text-dim); font-size: 12px; padding: 24px 0; }
footer code { background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>
<div class="container">
<header class="title">
  <h1>📚 Articles</h1>
  <p>X / Twitter 长文收藏与翻译 · 浏览 / 管理</p>
</header>

<section class="panel">
  <span class="panel-title">📖 文章列表 (<span id="count">0</span>)</span>
  <div class="toolbar">
    <input type="text" id="search-input" placeholder="🔍 按标题或作者搜索...">
    <button class="btn" id="refresh-btn">🔄 刷新</button>
    <div class="spacer"></div>
    <div class="admin-status" id="admin-status">
      <span class="dot"></span>
      <span>管理</span>
    </div>
    <button class="btn" id="admin-btn">🔓 启用管理</button>
  </div>
  <div id="article-list"></div>
</section>

<footer>
  Powered by buumicloud ·
  内容由本地 PC 提取后上传 ·
  构建工具 <code>articles_lib.py</code>
</footer>

<!-- 密码/确认 Modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal">
    <h3 id="modal-title">管理密码</h3>
    <p id="modal-desc">请输入管理密码以启用删除功能</p>
    <input type="password" id="modal-input" placeholder="密码">
    <div class="actions">
      <button class="btn" id="modal-cancel">取消</button>
      <button class="btn primary" id="modal-ok">确认</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
</div>
<script>
const $ = s => document.querySelector(s);
const listEl = $('#article-list');
const countEl = $('#count');
const searchInput = $('#search-input');
const adminBtn = $('#admin-btn');
const adminStatus = $('#admin-status');
let allItems = [];
let adminMode = !!localStorage.getItem('admin_pw');
let adminPw = localStorage.getItem('admin_pw') || null;

function applyAdminMode() {
  document.body.classList.toggle('admin-mode', adminMode);
  adminStatus.classList.toggle('on', adminMode);
  adminStatus.querySelector('span:last-child').textContent = adminMode ? '管理已启用' : '管理';
  adminBtn.textContent = adminMode ? '🔒 退出管理' : '🔓 启用管理';
  render();
}

adminBtn.addEventListener('click', () => {
  if (adminMode) {
    adminMode = false; adminPw = null; localStorage.removeItem('admin_pw');
    applyAdminMode();
  } else {
    showModal('管理密码', '请输入管理密码以启用删除功能', '', pwd => {
      // 验证
      fetch('/articles/api/list').then(r => r.json()).then(() => {
        // 简单存密码,删除时再校验
        adminMode = true; adminPw = pwd; localStorage.setItem('admin_pw', pwd);
        applyAdminMode();
        toast('管理已启用', 'ok');
      });
    });
  }
});

function toast(msg, type='') {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2000);
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render() {
  const q = searchInput.value.trim().toLowerCase();
  const items = q
    ? allItems.filter(a => (a.title || '').toLowerCase().includes(q) || (a.author || '').toLowerCase().includes(q))
    : allItems;
  countEl.textContent = q ? `${items.length}/${allItems.length}` : allItems.length;
  if (!items.length) {
    listEl.innerHTML = `<div class="empty">${q ? '没有匹配的文章' : '还没有文章。等待本地 PC 上传...'}</div>`;
    return;
  }
  listEl.innerHTML = items.map(a => `
    <a class="article-card" href="${a.url}" target="_blank" data-sid="${a.sid}">
      <h3>${escapeHtml(a.title)}</h3>
      <div class="meta">
        <span>📅 ${a.date || '?'}</span>
        <span>👤 @${escapeHtml(a.author || '?')}</span>
        <span class="badge ${a.translated ? 'trans' : 'raw'}">${a.translated ? '🤖 AI 翻译' : '📰 原文'}</span>
        ${a.has_images ? '<span class="badge img">🖼️ 含图</span>' : ''}
        <button class="copy-btn" data-url="${location.origin + a.url}">复制链接</button>
        <button class="delete-btn" data-sid="${a.sid}" data-title="${escapeHtml(a.title)}">🗑️ 删除</button>
      </div>
    </a>
  `).join('');
  // copy 按钮
  listEl.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', async e => {
      e.preventDefault(); e.stopPropagation();
      try {
        await navigator.clipboard.writeText(btn.dataset.url);
        btn.classList.add('ok');
        btn.textContent = '✓ 已复制';
        setTimeout(() => { btn.classList.remove('ok'); btn.textContent = '复制链接'; }, 1500);
      } catch { toast('复制失败', 'err'); }
    });
  });
  // delete 按钮
  listEl.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.preventDefault(); e.stopPropagation();
      const sid = btn.dataset.sid;
      const title = btn.dataset.title;
      showModal('确认删除', `确定删除 "${title}" 吗?此操作不可撤销。`, '', async () => {
        try {
          const r = await fetch('/articles/api/delete', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({sid, password: adminPw}),
          });
          if (r.status === 401) { toast('密码错误,请重新登录', 'err'); adminMode = false; adminPw = null; localStorage.removeItem('admin_pw'); applyAdminMode(); return; }
          if (!r.ok) { const j = await r.json(); toast(j.error || '删除失败', 'err'); return; }
          toast('已删除', 'ok');
          loadList();
        } catch (e) { toast('删除失败: ' + e.message, 'err'); }
      }, '🗑️ 删除', 'danger');
    });
  });
}

async function loadList() {
  try {
    const r = await fetch('/articles/api/list');
    allItems = await r.json();
    render();
  } catch (e) {
    listEl.innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>';
  }
}

// Modal
function showModal(title, desc, defaultVal, onOk, okText='确认', okClass='primary') {
  $('#modal-title').textContent = title;
  $('#modal-desc').textContent = desc;
  $('#modal-input').value = defaultVal;
  $('#modal-input').type = 'password';
  $('#modal-ok').textContent = okText;
  $('#modal-ok').className = 'btn ' + okClass;
  $('#modal-bg').classList.add('show');
  setTimeout(() => $('#modal-input').focus(), 50);
  const okHandler = () => { cleanup(); onOk($('#modal-input').value); };
  const cancelHandler = () => cleanup();
  const enterHandler = e => { if (e.key === 'Enter') okHandler(); if (e.key === 'Escape') cancelHandler(); };
  const cleanup = () => {
    $('#modal-bg').classList.remove('show');
    $('#modal-ok').removeEventListener('click', okHandler);
    $('#modal-cancel').removeEventListener('click', cancelHandler);
    document.removeEventListener('keydown', enterHandler);
  };
  $('#modal-ok').addEventListener('click', okHandler);
  $('#modal-cancel').addEventListener('click', cancelHandler);
  document.addEventListener('keydown', enterHandler);
}

$('#refresh-btn').addEventListener('click', () => loadList().then(() => toast('已刷新', 'ok')));
searchInput.addEventListener('input', render);

loadList();
setInterval(loadList, 30000);
applyAdminMode();
</script>
</body>
</html>
