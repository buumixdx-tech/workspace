[tool:pytest]
# pytest 配置文件

# 测试发现路径
testpaths = tests

# 输出选项
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    
# 忽略特定警告
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy.*
    ignore::PendingDeprecationWarning

# 标记
markers =
    slow: 标记为慢速测试
    integration: 标记为集成测试
    unit: 标记为单元测试

# 覆盖率配置
[coverage:run]
source = logic,models
omit = 
    tests/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
